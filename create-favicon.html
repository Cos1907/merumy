<!DOCTYPE html>
<html>
<head>
    <title>MERUMY Favicon Generator</title>
</head>
<body>
    <canvas id="faviconCanvas" width="32" height="32" style="border: 1px solid #ccc; margin: 20px;"></canvas>
    <canvas id="faviconCanvas16" width="16" height="16" style="border: 1px solid #ccc; margin: 20px;"></canvas>
    <canvas id="faviconCanvas48" width="48" height="48" style="border: 1px solid #ccc; margin: 20px;"></canvas>
    <canvas id="faviconCanvas180" width="180" height="180" style="border: 1px solid #ccc; margin: 20px;"></canvas>
    
    <div style="margin: 20px;">
        <button onclick="downloadFavicon()">Download Favicon (32x32)</button>
        <button onclick="downloadFavicon16()">Download Favicon (16x16)</button>
        <button onclick="downloadFavicon48()">Download Favicon (48x48)</button>
        <button onclick="downloadFavicon180()">Download Apple Touch Icon (180x180)</button>
    </div>

    <script>
        // MERUMY brand colors
        const merumyGreen = '#92D0AA'; // Primary green
        const white = '#FFFFFF';

        function createFavicon(canvas, size) {
            const ctx = canvas.getContext('2d');
            
            // Clear canvas
            ctx.clearRect(0, 0, size, size);
            
            // Create gradient background
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, merumyGreen);
            gradient.addColorStop(1, '#92D0AA'); // Primary green
            
            // Draw background
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, size, size);
            
            // Add subtle border radius effect
            ctx.globalCompositeOperation = 'destination-in';
            ctx.beginPath();
            ctx.roundRect(0, 0, size, size, size * 0.15);
            ctx.fill();
            ctx.globalCompositeOperation = 'source-over';
            
            // Draw white M letter
            ctx.fillStyle = white;
            ctx.font = `bold ${size * 0.7}px 'SF Pro Display', system-ui, sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // Add subtle shadow for better visibility
            ctx.shadowColor = 'rgba(0, 0, 0, 0.3)';
            ctx.shadowBlur = size * 0.05;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = size * 0.02;
            
            ctx.fillText('M', size / 2, size / 2);
            
            // Reset shadow
            ctx.shadowColor = 'transparent';
            ctx.shadowBlur = 0;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;
        }

        // Create different sizes
        const canvas32 = document.getElementById('faviconCanvas');
        const canvas16 = document.getElementById('faviconCanvas16');
        const canvas48 = document.getElementById('faviconCanvas48');
        const canvas180 = document.getElementById('faviconCanvas180');

        createFavicon(canvas32, 32);
        createFavicon(canvas16, 16);
        createFavicon(canvas48, 48);
        createFavicon(canvas180, 180);

        function downloadCanvas(canvas, filename) {
            const link = document.createElement('a');
            link.download = filename;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        function downloadFavicon() {
            downloadCanvas(canvas32, 'favicon-32x32.png');
        }

        function downloadFavicon16() {
            downloadCanvas(canvas16, 'favicon-16x16.png');
        }

        function downloadFavicon48() {
            downloadCanvas(canvas48, 'favicon-48x48.png');
        }

        function downloadFavicon180() {
            downloadCanvas(canvas180, 'apple-touch-icon.png');
        }

        // Add roundRect polyfill for older browsers
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, width, height, radius) {
                this.beginPath();
                this.moveTo(x + radius, y);
                this.lineTo(x + width - radius, y);
                this.quadraticCurveTo(x + width, y, x + width, y + radius);
                this.lineTo(x + width, y + height - radius);
                this.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
                this.lineTo(x + radius, y + height);
                this.quadraticCurveTo(x, y + height, x, y + height - radius);
                this.lineTo(x, y + radius);
                this.quadraticCurveTo(x, y, x + radius, y);
                this.closePath();
            };
        }
    </script>
</body>
</html>
